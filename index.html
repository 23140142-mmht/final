<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ECO WAVE</title>

<style>
:root{
    --accent:#00F0FF;
    --accent2:#00ff9d;
    --card-bg: rgba(20,30,80,0.65);
    --glass: rgba(0,0,0,0.45);
    --text:#EAF4FF;
}

body{
    margin:0;
    font-family:Segoe UI;
    color:var(--text);
    background:
    linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.7)),
    url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e')
    no-repeat center/cover fixed;
}

/* HEADER */
header{
    background:linear-gradient(135deg,#0a1f44,#0f8aa6);
    text-align:center;
    padding:30px;
}
header h1{
    color:var(--accent);
    text-shadow:0 0 10px var(--accent);
}

/* NAV */
nav{
    background:var(--glass);
    text-align:center;
    padding:12px;
}
nav a{
    color:white;
    margin:10px;
    text-decoration:none;
}
nav a:hover{
    background:var(--accent);
    color:black;
    padding:5px 10px;
    border-radius:5px;
}

/* CONTENIDO */
.container{
    padding:25px;
    margin:20px;
    background:var(--glass);
    border-radius:15px;
    backdrop-filter: blur(10px);
}

/* CARDS */
.card{
    background:var(--card-bg);
    border-left:5px solid var(--accent);
    padding:20px;
    margin:15px 0;
    border-radius:12px;
    transition:.3s;
}
.card:hover{
    transform:scale(1.02);
}

/* VIDEO */
.video{
    position:relative;
    padding-bottom:56.25%;
}
.video iframe{
    position:absolute;
    width:100%;
    height:100%;
    border-radius:10px;
}

</style>
</head>

<body>

<header>
<h1>ECO WAVE 🌊</h1>
<p>Energía sostenible</p>
</header>

<nav>
<a href="index.html">Inicio</a>
<a href="nosotros.html">Nosotros</a>
</nav>

<div class="container">

<div class="card">
<h2>Bienvenido</h2>
<p>Eco Wave es un proyecto enfocado en energías renovables y sostenibilidad.</p>
</div>

<div class="card">
<h2>Importancia</h2>
<p>Promueve el uso de energías limpias y reduce la contaminación.</p>
</div>

<!-- 🎥 VIDEO AGREGADO -->
<div class="card">
<h2>Video Informativo</h2>
<div class="video">
<iframe src="https://www.youtube.com/embed/PsDY2WgvdCk" 
frameborder="0" allowfullscreen></iframe>
</div>
</div>

</div>

</body>
</html>
